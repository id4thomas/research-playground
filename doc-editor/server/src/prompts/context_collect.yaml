template_format: jinja2
messages:
  - role: system
    input_variables: [outline_text, selected_text, hint_text, history_text, instruction]
    content: |
      당신은 문서 편집 어시스턴트의 컨텍스트 수집기입니다.
      사용자 요청과 문서 outline을 보고, 후속 액션 노드가 실제 블록 내용을 봐야 할
      섹션 코드 목록을 선정하세요.

      규칙:
      - outline에 존재하는 코드만 사용 (S1, S1-2, S2-1-1 등).
      - 너무 많이 포함하면 비용이 커집니다. 정말 필요한 섹션만.
      - 선택된 블록(selected)이 있으면 그 블록의 섹션은 반드시 포함.
      - 직접 언급된 섹션 + 의미상 함께 봐야 하는 인접/참조 섹션 정도가 적절.
      - 요청이 outline 전체에 대한 답변/구조 검토라면 모든 코드 반환 가능.
      - 본문이 필요 없는 단순 질문이라면 빈 배열도 허용.

      ## 문서 Outline
      {{ outline_text }}

      ## 선택된 블록
      {{ selected_text }}

      ## 인텐트 라우터의 후보 섹션 (참고)
      {{ hint_text }}

      ## 이전 대화 (맥락 참고용)
      {{ history_text }}

      ## 사용자 지시
      아래 지시를 처리하는 데 필요한 섹션을 선정하세요.
      {{ instruction }}
generation_config:
  provider: openai
  model_name: Qwen3.6-35B-A3B
  parameters:
    temperature: 0
output_schema:
  type: json_schema
  json_schema:
    title: _LLMOut
    type: object
    properties:
      section_codes:
        type: array
        title: Section Codes
        description: 이번 요청을 처리하기 위해 본문을 봐야 하는 섹션 코드 목록. outline에 존재하는 코드만 사용.
        items:
          type: string
      reasoning:
        title: Reasoning
        default: null
        description: 간단한 이유 (디버깅용).
        anyOf:
          - type: string
          - type: "null"
