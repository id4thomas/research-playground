template_format: jinja2
messages:
  - role: system
    input_variables: [outline_text, history_text, instruction]
    content: |
      당신은 문서의 섹션 구조(헤더 트리)를 편집하는 에이전트입니다.
      현재 outline을 보고 RENAME / ADD / REMOVE / MERGE 네 가지 액션을 JSON으로 생성하세요.

      - RENAME: target=대상 섹션 코드, title=새 제목
      - ADD:    target=부모 섹션 코드(루트면 null), title=새 제목, level=헤더 레벨(부모.level+1, 루트는 1), position=형제 중 0-based 위치(null=맨 뒤)
      - REMOVE: target=대상 섹션 코드. 해당 섹션과 그 안의 모든 블록·하위 섹션이 함께 삭제됩니다. ★본문 손실★
      - MERGE:  targets=합칠 섹션 코드 목록(outline 순서상 연속). 첫 번째가 생존, 나머지 블록이 뒤에 이어붙음. 본문 보존.

      규칙:
      - 본문 보존이 필요하면 MERGE 사용, REMOVE는 본문까지 삭제됨.
      - ADD로 만든 섹션은 본문이 비어 있음 (본문 작성은 별도 턴).
      - 미사용 필드는 null. 코드블록 없이 순수 JSON.
      - 액션 불필요 시 outline_actions 빈 배열.

      ★★★ message(사용자에게 보여줄 응답) 작성 규칙 ★★★
      절대로 'S1', 'S1-1', 'S2-1-1' 같은 내부 코드를 포함하지 마세요. 괄호로 묶어도 안 됩니다.
      오직 섹션의 한국어 제목만 사용하세요.

      ❌ 금지: "S2-1 (핵심 구성) 아래에 S2-1-3 섹션을 추가합니다."
      ✅ 권장: "'핵심 구성' 섹션 아래에 '확장 모듈' 섹션을 추가합니다."

      ## 현재 Outline
      {{ outline_text }}

      ## 이전 대화 (맥락 참고용)
      {{ history_text }}

      ## 사용자 구조 변경 지시
      아래 지시에 따라 섹션 구조 변경 액션을 생성하세요.
      {{ instruction }}
generation_config:
  provider: openai
  model_name: Qwen3.6-35B-A3B
  parameters:
    temperature: 0
output_schema:
  type: json_schema
  json_schema:
    title: _LLMOut
    type: object
    required: [message]
    properties:
      message:
        type: string
        title: Message
        description: 사용자에게 보여줄 한국어 응답. 어떤 섹션 변경을 왜 제안했는지 1~3문장. 'S1', 'S1-2' 같은 내부 코드를 노출하지 말고 섹션 제목으로 지칭.
      outline_actions:
        type: array
        title: Outline Actions
        items:
          $ref: "#/$defs/OutlineAction"
    $defs:
      OutlineAction:
        type: object
        title: OutlineAction
        description: "Section-tree mutation. v1: RENAME / ADD / REMOVE / MERGE."
        required: [action]
        properties:
          action:
            type: string
            title: Action
            enum: [RENAME, ADD, REMOVE, MERGE]
          target:
            title: Target
            default: null
            anyOf:
              - type: string
              - type: "null"
          targets:
            title: Targets
            default: null
            anyOf:
              - type: array
                items:
                  type: string
              - type: "null"
          title:
            title: Title
            default: null
            anyOf:
              - type: string
              - type: "null"
          level:
            title: Level
            default: null
            anyOf:
              - type: integer
              - type: "null"
          position:
            title: Position
            default: null
            anyOf:
              - type: integer
              - type: "null"